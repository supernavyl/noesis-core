name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: ruff + pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The full dependency set (torch, sentence-transformers, pyserini/JDK, …)
      # is infeasible on free runners. The unit tests lazy-import those heavy
      # modules, so CI installs only the light runtime deps needed to import and
      # exercise the tested code paths. Live services (Qdrant/Postgres/Ollama)
      # are gated by NOESIS_CI and never contacted here.
      - name: Install light deps
        run: |
          pip install --no-deps -e .
          pip install \
            pytest pytest-asyncio ruff \
            pydantic pydantic-settings pyyaml httpx orjson \
            loguru rich typer tenacity anyio numpy qdrant-client

      - name: ruff check
        run: ruff check noesis/ tests/

      - name: pytest
        run: pytest tests/ -q
        env:
          NOESIS_CI: "1"

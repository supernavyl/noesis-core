name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check noesis/ tests/

      - name: pytest
        run: uv run pytest tests/ -v
        env:
          # Tests are designed to run without live services (Qdrant/Ollama/Postgres).
          # Any test that requires them is gated by env-var skips; this CI only
          # exercises the unit-test surface.
          NOESIS_CI: "1"

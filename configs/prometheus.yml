global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: noesis
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres:5432"]
